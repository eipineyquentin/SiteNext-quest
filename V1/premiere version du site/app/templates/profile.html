
{% extends "base.html" %}
{% block content %}
<h1>Données personnelles</h1>
{% if not current_user %}
  <div class="alert">Connectez-vous pour gérer vos données.</div>
  <a class="btn" href="{{ url_for('auth') }}">Connexion / Inscription</a>
{% else %}
<div class="card">
  <h3>Mon profil</h3>
  <form method="post" action="{{ url_for('update_profile') }}">
    <div class="form-group"><label>Nom</label><input name="name" value="{{ current_user['name'] }}"></div>
    <div class="form-group"><label>Email</label><input name="email" value="{{ current_user['email'] }}"></div>
    <div class="form-group"><label>Nouveau mot de passe</label><input name="password" type="password"></div>
    <button class="btn btn--primary" type="submit">Mettre à jour</button>
  </form>
</div>
{% if current_user['role']=='etudiant' %}
<div class="card" style="margin-top:16px;">
  <h3>Mini‑CV</h3>
  <form method="post" action="{{ url_for('update_cv') }}">
    <div class="form-group"><label>Résumé</label><textarea name="cv" rows="4">{{ current_user.get('cv','') }}</textarea></div>
    <button class="btn btn--primary" type="submit">Enregistrer</button>
  </form>
</div>
{% endif %}
<form method="post" action="{{ url_for('delete_account') }}" onsubmit="return confirm('Supprimer votre compte ?')">
  <button class="btn" style="margin-top:16px;">Supprimer mon compte</button>
</form>
{% endif %}
{% endblock %}
